name: Update Market Data

on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write frontend config
        run: |
          echo "window.SUPABASE_URL='$SUPABASE_URL';" > assets/env.js
          echo "window.SUPABASE_ANON_KEY='$SUPABASE_ANON_KEY';" >> assets/env.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Fetch market data
        run: python scripts/fetch_data.py
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/market_data.json assets/env.js
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: update market data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Send daily email brief
        run: python scripts/send_email.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          GITHUB_REPOSITORY: ${{ github.repository }}
